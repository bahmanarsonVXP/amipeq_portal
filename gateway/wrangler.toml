name = "amipeqportalgateway"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
TWENTY_API_URL = "https://twenty-production-7352.up.railway.app"
BACKEND_URL    = "https://backend-amipeq.up.railway.app"
FRONTEND_URL   = "https://amipeq-portal.pages.dev"

# Secrets (set via wrangler secret put):
# TWENTY_API_KEY
# SUPABASE_JWT_SECRET  (JWT Secret du projet Supabase application RPS — voir docs/authentification.md)
# PUBLIC_GATEWAY_URL  (ex. https://amipeqportalgateway.arsonbahman.workers.dev — notes Twenty)

[[r2_buckets]]
binding = "DEVIS_DOCUMENTS"
bucket_name = "amipeq-devis-documents"
preview_bucket_name = "amipeq-devis-documents-preview"
